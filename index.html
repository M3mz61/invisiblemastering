    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }
        .page-wrapper {
            display: flex;

        }

            background-color: #000000;
        }
        .bottom-right-man {
            top: 0;
            right: 20%; 
            transform: scaleX(-1); 
        }
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }
        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }
        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }
        @keyframes cleanFadeIn {

            }
