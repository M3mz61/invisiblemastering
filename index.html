<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering zINC</title>
    <style>
        /* 1. Reset Canvas to Pure Minimal Studio Black */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000 !important;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 2. Flex wrapper to dead-center the artwork on Mac and Mobile */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background-color: #000000;
        }

        /* 3. Elastic Container for your Glow Graphic */
        .hero-showcase {
            width: 100%;
            max-width: 850px; /* Limits width on massive iMac/Mac Pro screens so it stays laser-sharp */
            margin-bottom: 25px;
        }

        .glow-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 4. Minimalist Navigation Row Links */
        .studio-nav {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-item {
            color: #444444; /* Muted gray anchors that pop white when hovered */
            text-decoration: none;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <div class="hero-showcase">
            <img src="invisible_Main.png" alt="Invisible Mastering zINC" class="glow-banner">
        </div>

        <nav class="studio-nav">
            <a href="info.html" class="nav-item">[info]</a>
            <a href="vinyl.html" class="nav-item">[vinyl]</a>
        </nav>

    </div>

</body>
</html>
