<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Lock down a pristine, unified true black mobile viewport wrapper */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* The master container holding all independent layers */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Base rules for the corner graphics layers */
        .detective-layer {
            position: absolute;
            width: 100%;
            height: 38vh; /* Keeps the graphics sized perfectly for phone screens */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none; /* Keeps the screen responsive to scrolling or clicks */
            z-index: 1;
        }

        /* 1. Upper-Left Corner: Anchored at the top, naturally facing right */
        .upper-left {
            top: 0;
            left: 0;
            background-position: left top;
        }

        /* 2. Bottom-Right Corner: Anchored at the bottom, flipped to face left */
        .bottom-right {
            bottom: 0;
            right: 0;
            background-position: right bottom;
            transform: scaleX(-1); /* Correctly mirrors the image horizontally */
        }

        /* Central Typography Zone: Floating perfectly in the sweet spot between them */
        .branding-centerpiece {
            position: relative;
            z-index: 10; /* Ensures text stays sharply on top */
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            
            /* Clean, elegant fade-in animation */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Subtle off-white for text hierarchy */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="detective-layer upper-left"></div>

        <div class="detective-layer bottom-right"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
