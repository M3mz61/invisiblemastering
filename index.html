<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Force a total true black canvas on the mobile viewport wrapper */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Absolute deep true black */
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Top Zone: Dedicated exclusively to displaying your left-aligned asset */
        .character-zone {
            width: 100%;
            height: 55vh; /* Locks his framing space to the upper half of the screen */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: left bottom; /* Keeps him beautifully sitting on the lower bound of his box */
            background-size: contain; /* Assures he scales naturally without cropping out his hat or boots */
        }

        /* Bottom Zone: Safely presents the branding elements centrally below him */
        .branding-zone {
            width: 100%;
            height: 45vh; /* Balanced space for your text stack to breathe */
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Aligns content cleanly from the top down */
            align-items: center;
            padding-top: 20px; /* Slight buffer spacing directly beneath your character asset */
            color: #ffffff; /* Radiant brilliant white */
            text-align: center;
            
            /* The elegant dropdown build-in animation sequence */
            opacity: 0;
            transform: translateY(-20px);
            animation: cleanDropDown 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Subtle clean gray accent layer */
            font-weight: 300;
            margin: 0;
        }

        @keyframes cleanDropDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="character-zone"></div>

    <div class="branding-zone">
        <h1 class="title">Invisible Mastering Inc</h1>
        <p class="tagline">Heard, but not seen.</p>
    </div>

</body>
</html>
