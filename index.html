<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Establish a unified, overflow-hidden true black canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Full viewport manager keeping elements integrated */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Graphic layer - locked to the left side and spanning top-to-bottom */
        .character-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: left center; /* Maintains your preferred left alignment */
            background-size: contain;
            z-index: 1;
            /* Ensures the image doesn't block touch interactions on mobile browsers */
            pointer-events: none; 
        }

        /* Typography Overlay - mathematically centered over the viewport */
        .branding-centerpiece {
            position: relative;
            z-index: 2; /* Layered cleanly over the graphic canvas */
            width: 90%;
            max-width: 500px;
            text-align: center;
            color: #ffffff;
            /* Subtle shift upward to counter the mobile browser's bottom navigation bar visually */
            transform: translateY(-5vh); 
            
            /* Fluid entry animation sequence */
            opacity: 0;
            animation: cleanFadeIn 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Subtle clean contrast gray */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="character-bg"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
