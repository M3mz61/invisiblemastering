<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Unmovable true black absolute canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* The overall playing card layout container window */
        .card-frame {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The graphic assets act like the corner suits of a playing card */
        .corner-graphic {
            position: absolute;
            width: 50vw;  /* Scaled naturally to screen width */
            height: 35vh; /* Scaled naturally to screen height */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
        }

        /* 1. TOP LEFT CORNER: Facing right naturally */
        .top-left {
            top: 0;
            left: 0;
            background-position: left top;
        }

        /* 2. BOTTOM RIGHT CORNER: Mirrored and facing left */
        .bottom-right {
            bottom: 0;
            right: 0;
            background-position: right bottom;
            transform: scaleX(-1); /* Flips the figure horizontally */
        }

        /* CENTRAL BRANDING CONTENT: Floating safely right in the middle space */
        .branding-centerpiece {
            position: relative;
            z-index: 10; /* Ensures the typography stays sharply on top */
            width: 85%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            
            /* Fluid fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Balanced clean gray contrast */
            margin: 0;
            font-weight: 300;
        }

        /* Clean responsive boost for larger high-res screens like the Mac Pro */
        @media (min-width: 1024px) {
            .corner-graphic {
                width: 25vw;  /* Shrinks the footprint down on large desktops so it looks premium */
                height: 40vh;
            }
            .title {
                font-size: 3.5rem;
                letter-spacing: 2px;
            }
            .tagline {
                font-size: 1.6rem;
            }
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="card-frame">
        <div class="corner-graphic top-left"></div>

        <div class="corner-graphic bottom-right"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
