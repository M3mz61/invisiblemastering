<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Pristine, true black mobile canvas environment */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Full viewport master frame */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Base settings for the background graphics */
        .detective-layer {
            position: absolute;
            width: 100%;
            height: 45vh; /* Prevents the image from crowding the screen height-wise */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none; /* Keeps the screen fully tappable */
        }

        /* 1. Upper-Left Corner: Positioned at the top, facing right */
        .upper-left {
            top: 0;
            left: 0;
            background-position: left top;
        }

        /* 2. Bottom-Right Corner: Positioned at the bottom, flipped to face left */
        .bottom-right {
            bottom: 0;
            right: 0;
            background-position: right bottom;
            transform: scaleX(-1); /* Horizontally mirrors the image */
        }

        /* Typography Zone: Securely centered right in the middle of the diagonal split */
        .branding-centerpiece {
            position: relative;
            z-index: 10; 
            width: 85%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            
            /* Smooth fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Crisp off-white contrast */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="detective-layer upper-left"></div>

        <div class="detective-layer bottom-right"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
