<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Seamless deep black baseline */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Stable column arrangement tracking */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Container sections provide spatial boundaries */
        .graphic-section {
            width: 100%;
            height: 35vh; 
            position: relative;
            background-color: #000000;
        }

        /* The actual floating figure layer */
        .detective-asset {
            position: absolute;
            height: 100%;
            width: auto; /* Let the crop choose its natural width proportions */
        }

        /* 1. TOP ZONE: Moved away from the left wall closer to the center */
        .top-left-man {
            top: 0;
            left: 0;
            margin-left: 12%; /* Adjust this percentage to move him closer or further from center */
        }

        /* 2. MIDDLE ZONE: Content typography channel */
        .text-zone {
            width: 100%;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* 3. BOTTOM ZONE: Flipped horizontally and moved away from the right wall closer to the center */
        .bottom-right-man {
            top: 0;
            right: 0;
            margin-right: 12%; /* Adjust this percentage to move him closer or further from center */
            transform: scaleX(-1); /* Flips asset cleanly toward the text */
        }

        /* Central Branding Presentation */
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="graphic-section">
            <img src="detective-cropped.jpg" class="detective-asset top-left-man" alt="Detective Left">
        </div>

        <div class="text-zone">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="graphic-section">
            <img src="detective-cropped.jpg" class="detective-asset bottom-right-man" alt="Detective Right">
        </div>
    </div>

</body>
</html>
