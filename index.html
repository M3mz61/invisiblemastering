<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Creates an unmovable, seamless absolute black canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* True deep black */
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Full screen master container */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Core rules for your floating background figures */
        .detective-asset {
            position: absolute;
            max-width: 45vw; /* Prevents figures from crowding out the center text */
            max-height: 38vh;
            pointer-events: none;
            
            /* CRITICAL: Blends the image background perfectly into the true black page */
            mix-blend-mode: screen; 
        }

        /* 1. TOP LEFT CORNER: Facing right naturally */
        .upper-left {
            top: 2%;
            left: 2%;
        }

        /* 2. BOTTOM RIGHT CORNER: Mirrored and facing left */
        .bottom-right {
            bottom: 2%;
            right: 2%;
            transform: scaleX(-1); /* Flips him cleanly to frame the text */
        }

        /* Typography Piece: Centered exactly in the open diagonal space */
        .branding-centerpiece {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 460px;
            text-align: center;
            color: #ffffff;
            
            /* Clean fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Balanced clean contrast */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <img src="Invisible%20man%201.png" alt="" class="detective-asset upper-left">

        <img src="Invisible%20man%201.png" alt="" class="detective-asset bottom-right">

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
