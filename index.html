    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            box-sizing: border-box;
            padding: 4rem 1.5rem;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
            text-align: center;
        }
        .logo-link {
            width: 320px; /* Doubled the visual footprint size */
            height: auto;
            margin-bottom: 3rem;
            transition: opacity 0.3s ease;

            display: block;
        }
        .tagline {
            font-family: "Bodoni 72", "Bodoni MT", Didot, "Playfair Display", serif;
            font-size: 1.2rem;
            font-style: italic;
            color: #555555;
            margin: 0;
            font-weight: 400;
        }
        footer {
            width: 100%;
            max-width: 450px;
            text-align: center;
            font-size: 0.75rem;
            color: #999999;
            line-height: 1.6;
            letter-spacing: 0.02rem;
            border-top: 1px dashed #eeeeee;
            padding-top: 1.5rem;
        }
        .footer-link {
            color: #666666;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .footer-link:hover {

</head>
<body>

    <div></div> <!-- Invisible balance spacer -->
