<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Matches the background color of your image for a seamless canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f6f6f6; /* Premium off-white tone matching the image texture */
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #1a1a1a; /* Clean dark gray text to stand out sharply */
            text-align: center;
        }

        /* Displays your character completely centered and unified */
        .character-container {
            width: 100%;
            height: 45vh; 
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: center bottom;
            background-size: contain;
        }

        /* Animated typography section */
        .branding {
            margin-top: 25px;
            padding: 0 20px;
            opacity: 0;
            transform: translateY(-20px);
            animation: elegantDropDown 1.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #555555; /* Soft gray for elegant contrast */
            font-weight: 300;
        }

        @keyframes elegantDropDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="character-container"></div>

    <div class="branding">
        <div class="title">Invisible Mastering Inc</div>
        <div class="tagline">Heard, but not seen.</div>
    </div>

</body>
</html>
