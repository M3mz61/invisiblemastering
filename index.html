<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Force a unified seamless TRUE BLACK canvas across the entire screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Absolute True Black */
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff; /* Brilliant White Text */
            text-align: center;
        }

        /* Dead-center your invisible detective graphic and invert it to white lines */
        .character-container {
            width: 100%;
            height: 45vh; 
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            /* Inverts the black line asset into brilliant white lines over the true black background */
            filter: invert(1); 
        }

        /* Fluid text entry drop down animation */
        .branding {
            margin-top: 25px;
            padding: 0 20px;
            opacity: 0;
            transform: translateY(-20px);
            animation: clearDropDown 1.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.3s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Balanced off-white/gray tone for clean typographic hierarchy */
            font-weight: 300;
        }

        @keyframes clearDropDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="character-container"></div>

    <div class="branding">
        <div class="title">Invisible Mastering Inc</div>
        <div class="tagline">Heard, but not seen.</div>
    </div>

</body>
</html>
