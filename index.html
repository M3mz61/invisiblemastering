<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* True black root foundation */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Master container stacks the three stripes evenly */
        .tricolor-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Each stripe takes up exactly 1/3 of the screen height */
        .stripe {
            width: 100%;
            height: 33.33vh; 
            position: relative;
            box-sizing: border-box;
        }

        /* 1. TOP STRIPE: Contains the original detective aligned left */
        .top-band {
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: left center;
            background-size: contain;
        }

        /* 2. MIDDLE STRIPE: Solid black channel for text */
        .middle-band {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. BOTTOM STRIPE: Contains the mirrored detective aligned right */
        .bottom-band {
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: right center;
            background-size: contain;
            transform: scaleX(-1); /* Mirrors the entire band horizontally */
        }

        /* Typography sizing inside the middle black stripe */
        .branding-centerpiece {
            width: 90%;
            max-width: 500px;
            text-align: center;
            color: #ffffff;
            
            /* Clean fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        /* Re-corrects the text orientation because the bottom block flip mirrors inherited text */
        .reverse-flip {
            transform: scaleX(-1);
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; 
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="tricolor-container">
        <div class="stripe top-band"></div>

        <div class="stripe middle-band">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="stripe bottom-band"></div>
    </div>

</body>
</html>
