<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Creates a single, seamless, non-scrolling canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* This container manages BOTH image instances on a single layer.
           - First image asset is pinned to top-left, scaled to fit gracefully.
           - Second image asset is pinned to bottom-right.
        */
        .diagonal-canvas {
            position: relative;
            width: 100%;
            height: 100%;
            
            /* High-performance multi-background stacking */
            background-image: url('Invisible%20man%201.png'), url('Invisible%20man%201.png');
            background-repeat: no-repeat, no-repeat;
            background-position: left top, right bottom;
            background-size: auto 35vh, auto 35vh; /* Uniform sizing prevents crowding on mobile viewports */
            
            /* Displays typography cleanly in the middle of the frame */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CSS Pseudo-element handles the mirroring operation.
           This targets only the second background layer at the bottom right, 
           flipping him horizontally to face inward toward the text.
        */
        .diagonal-canvas::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: right bottom;
            background-size: auto 35vh;
            transform: scaleX(-1); /* Flips the figure cleanly */
            pointer-events: none;
            z-index: 1;
        }

        /* Typography Centerpiece: Remains independent and safe from background seams */
        .branding-centerpiece {
            position: relative;
            z-index: 10; 
            width: 85%;
            max-width: 450px;
            text-align: center;
            color: #ffffff;
            
            /* Elegant display fade-in animation sequence */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Subtle off-white for crisp text definition */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="diagonal-canvas">
        
        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>

    </div>

</body>
</html>
