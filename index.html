<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Global true black canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* --- STABLE VERTICAL PHONE FLOW --- */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Pulls your exact newly cropped asset */
        .graphic-block {
            width: 100%;
            height: 35vh; 
            background-image: url('detective-cropped.jpg');
            background-repeat: no-repeat;
            background-size: contain;
        }

        /* Top block: Left-aligned */
        .top-left-man {
            background-position: left top;
        }

        /* Middle block: Centered Text Zone */
        .text-zone {
            width: 100%;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* Bottom block: Mirrored for iOS Firefox layout stability */
        .bottom-right-man {
            background-position: left bottom; 
            transform: scaleX(-1); 
        }

        /* Central Typography Presentation Layout */
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }

        /* --- UNIFIED DESKTOP & MAC PRO SYSTEM --- */
        @media (min-width: 1025px) {
            .page-wrapper {
                position: relative;
                display: block; /* Disables stacked boxes on desktop */
            }

            /* Breaks graphics out of constraints into absolute layout placements */
            .graphic-block {
                position: absolute;
                width: 30vw;   /* Keeps figures perfectly scaled to screen width */
                height: 45vh;  /* High rendering box limits */
                z-index: 1;
            }

            .top-left-man {
                top: 20px;
                left: 20px;
                background-position: left top;
            }

            .bottom-right-man {
                bottom: 20px;
                right: 20px;
                top: auto;
                background-position: left bottom;
            }

            /* Snaps content precisely to the absolute center of the Mac Pro display */
            .text-zone {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: auto;
                height: auto;
                z-index: 10;
                background-color: transparent;
            }

            .title {
                font-size: 3.6rem; 
                letter-spacing: 2px;
            }

            .tagline {
                font-size: 1.6rem;
            }
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="graphic-block top-left-man"></div>

        <div class="text-zone">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="graphic-block bottom-right-man"></div>
    </div>

</body>
</html>
