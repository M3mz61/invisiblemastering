<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Deep true black background canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Continuous stacked vertical arrangement tracking */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Container blocks providing spatial boundaries */
        .graphic-block {
            width: 100%;
            height: 35vh; 
            position: relative;
            background-color: #000000;
        }

        /* The actual floating figure asset layer */
        .detective-asset {
            position: absolute;
            height: 100%;
            width: auto; /* Maintains natural artwork image proportions */
            
            /* MAGIC TRICK: Drops the image background entirely while leaving white lines crisp */
            mix-blend-mode: screen; 
        }

        /* 1. TOP ZONE: Positioned inward from the left wall towards center */
        .top-left-man {
            top: 0;
            left: 20%; 
        }

        /* 2. MIDDLE ZONE: Dedicated pure typography channel */
        .text-zone {
            width: 100%;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* 3. BOTTOM ZONE: Positioned inward from the right wall and cleanly mirrored */
        .bottom-right-man {
            top: 0;
            right: 20%; 
            transform: scaleX(-1); /* Flips asset horizontally toward the text centerpiece */
        }

        /* Central branding typography centerpiece */
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="graphic-block">
            <img src="detective-cropped.jpg" class="detective-asset top-left-man" alt="Detective Left">
        </div>

        <div class="text-zone">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="graphic-block">
            <img src="detective-cropped.jpg" class="detective-asset bottom-right-man" alt="Detective Right">
        </div>
    </div>

</body>
</html>
