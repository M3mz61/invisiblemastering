<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc.</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            box-sizing: border-box;
            padding: 4rem 1.5rem;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
        }
        .logo-link {
            width: 160px;
            height: auto;
            margin-bottom: 2.5rem;
            transition: opacity 0.3s ease;
        }
        .logo-link:hover {
            opacity: 0.7;
        }
        .logo-link img {
            width: 100%;
            height: auto;
            display: block;
        }
        .enter-link {
            font-family: "Bodoni 72", "Bodoni MT", Didot, serif;
            font-size: 1.5rem;
            letter-spacing: 0.1rem;
            text-decoration: none;
            color: #111111;
            border-bottom: 1px solid #111111;
            padding-bottom: 4px;
            font-weight: 700;
            transition: color 0.3s ease, border-color 0.3s ease;
        }
        .enter-link:hover {
            color: #888888;
            border-color: #888888;
        }
        footer {
            width: 100%;
            max-width: 450px;
            text-align: center;
            font-size: 0.75rem;
            color: #999999;
            line-height: 1.6;
            letter-spacing: 0.02rem;
            border-top: 1px dashed #eeeeee;
            padding-top: 1.5rem;
        }
        .footer-link {
            color: #666666;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .footer-link:hover {
            color: #000000;
            border-color: #000000;
        }
    </style>
</head>
<body>

    <div></div> <!-- Empty top spacer to maintain perfect balance -->

    <main>
        <a href="rates.html" class="logo-link">
            <img src="images/Hat%20glasses%203:4.png" alt="Invisible Mastering">
        </a>
        <a href="rates.html" class="enter-link">Enter</a>
    </main>

    <footer>
        Invisible Mastering © 2026 / <a href="https://flaversoulrecords.com" class="footer-link">Flave R Soul Records</a> © All Rights Reserved.
    </footer>

</body>
</html>
