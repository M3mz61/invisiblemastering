<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Lock down a clean, true black mobile canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Container that holds the background layers and the centered text */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Base settings for both detective graphics */
        .detective-layer {
            position: absolute;
            width: 100%;
            height: 50vh; /* Takes up the top half of the visual space */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none; /* Prevents clicks/taps from messing with the screen */
        }

        /* 1. Original Detective: Sitting naturally at the bottom-left */
        .left-side {
            top: 0;
            left: 0;
            background-position: left bottom;
        }

        /* 2. Mirrored Detective: Flipped and sitting at the bottom-right */
        .right-side {
            bottom: 0;
            right: 0;
            background-position: right bottom;
            /* scaleX(-1) horizontally mirrors the image so he faces inward */
            transform: scaleX(-1); 
        }

        /* Typography Overlay: Perfectly centered in the sweet spot between them */
        .branding-centerpiece {
            position: relative;
            z-index: 10; 
            width: 90%;
            max-width: 500px;
            text-align: center;
            color: #ffffff;
            
            /* Smooth, clean fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Clean gray contrast tint */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="detective-layer left-side"></div>

        <div class="detective-layer right-side"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
