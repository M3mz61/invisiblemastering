<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Setup a unified, absolute true black screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* 1. UPPER LEFT CORNER: Floating asset facing right */
        .man-top-left {
            position: fixed;
            top: 0;
            left: 0;
            width: 50vw; 
            height: 35vh; 
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: left top;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
        }

        /* 2. BOTTOM RIGHT CORNER: Floating asset mirrored to face left */
        .man-bottom-right {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50vw; 
            height: 35vh; 
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: right bottom;
            background-size: contain;
            transform: scaleX(-1); /* Mirrors him horizontally */
            pointer-events: none;
            z-index: 1;
        }

        /* TYPOGRAPHY CENTERPIECE: Anchored perfectly in the screen sweet spot */
        .branding-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            text-align: center;
            color: #ffffff;
            z-index: 10; /* Keeps text layered cleanly on top */
            
            /* Fluid fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Balanced off-white layer for crisp contrast */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="man-top-left"></div>
    <div class="man-bottom-right"></div>

    <div class="branding-container">
        <h1 class="title">Invisible Mastering Inc</h1>
        <p class="tagline">Heard, but not seen.</p>
    </div>

</body>
</html>
