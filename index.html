<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Setup a unified, absolute true black screen canvas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Full screen master relative wrapper container */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Graphic base zones - Sized by width so he stays large on mobile */
        .detective-layer {
            position: absolute;
            width: 75vw; /* Makes him take up 75% of the screen width so he stays big */
            height: 50vh; /* Gives him plenty of vertical room so he isn't squished */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            pointer-events: none; 
            z-index: 1;

            /* Blends the charcoal box into pure black */
            mix-blend-mode: lighten; 
        }

        /* 1. Upper-Left Corner: Anchored top-left, naturally facing right */
        .upper-left {
            top: -2%;   /* Slightly tucked away for a clean crop */
            left: -5%;
            background-position: left top;
        }

        /* 2. Bottom-Right Corner: Anchored bottom-right, flipped to face left */
        .bottom-right {
            bottom: -2%;
            right: -5%;
            background-position: right bottom;
            transform: scaleX(-1); /* Horizontal mirror flip */
        }

        /* Central Typography Zone: Floating perfectly clear in the middle */
        .branding-centerpiece {
            position: relative;
            z-index: 10; 
            width: 85%;
            max-width: 460px;
            text-align: center;
            color: #ffffff;
            
            /* Clean fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; 
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="detective-layer upper-left"></div>

        <div class="detective-layer bottom-right"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
