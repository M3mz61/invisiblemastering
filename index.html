<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering zINC</title>
    <style>
        /* 1. Reset Global Studio Canvas to Pure Black */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000 !important;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* 2. Main Flex Container to Center Everything */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: #000000;
        }

        /* 3. Hero Graphic Scaling Box */
        .hero-showcase {
            width: 100%;
            max-width: 900px; /* Limits size on massive Mac Pro screens so it stays sharp */
            margin-bottom: 40px;
        }

        .glow-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 4. Minimalist Link Alignment */
        .studio-nav {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-item {
            color: #555555; /* Sleek muted gray links */
            text-decoration: none;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #ffffff; /* Glow white on hover */
        }

        /* 5. Minimalist Clean Footer */
        footer {
            margin-top: 40px;
            text-align: center;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .page-wrapper {
                padding: 20px 15px;
                justify-content: flex-start; /* Flows naturally on small phone screens */
                padding-top: 60px;
            }
            .hero-showcase {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <div class="hero-showcase">
            <img src="invisible_Main.png" alt="Invisible Mastering zINC - Heard, but not seen" class="glow-banner">
        </div>

        <nav class="studio-nav">
            <a href="info.html" class="nav-item">[info]</a>
            <a href="vinyl.html" class="nav-item">[vinyl]</a>
        </nav>

        <footer>
            <a href="info.html" style="color: #111111; font-size: 10px; text-decoration: none;">[sys_archive]</a>
        </footer>

    </div>

</body>
</html>
