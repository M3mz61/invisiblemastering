<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Stable off-black canvas baseline */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d11; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Continuous stacked vertical alignment */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Core container logic with an integrated gradient fade to dissolve texture edges */
        .graphic-block {
            width: 100%;
            height: 35vh; 
            background-image: url('detective-cropped.jpg');
            background-repeat: no-repeat;
            background-size: contain;
            position: relative;
        }

        /* 1. TOP BLOCK: Positioned inward from left wall with an edge-smoothing gradient */
        .top-left-man {
            background-position: 20% top; 
        }
        .top-left-man::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Fades out any harsh image edges horizontally and vertically */
            background: linear-gradient(to right, #0d0d11 5%, transparent 25%, transparent 75%, #0d0d11 95%),
                        linear-gradient(to bottom, transparent 80%, #0d0d11 100%);
            pointer-events: none;
        }

        /* 2. MIDDLE BLOCK: Pure typography channel */
        .text-zone {
            width: 100%;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0d0d11;
        }

        /* 3. BOTTOM BLOCK: Mirrored position with corresponding edge-smoothing gradient */
        .bottom-right-man {
            background-position: 20% bottom; 
            transform: scaleX(-1); 
        }
        .bottom-right-man::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Reverses gradient directions to match the mirrored orientation */
            background: linear-gradient(to right, #0d0d11 5%, transparent 25%, transparent 75%, #0d0d11 95%),
                        linear-gradient(to top, transparent 80%, #0d0d11 100%);
            pointer-events: none;
        }

        /* Central branding typography centerpiece */
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="graphic-block top-left-man"></div>

        <div class="text-zone">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="graphic-block bottom-right-man"></div>
    </div>

</body>
</html>
