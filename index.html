<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* True black mobile viewport foundation */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Stacks the three layout blocks vertically */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Fixed container block dimensions */
        .graphic-block {
            width: 100%;
            height: 35vh; 
            position: relative;
        }

        /* 1. TOP BLOCK: Original graphic anchored cleanly to the top-left */
        .top-left-man {
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            background-position: left top;
        }

        /* 2. MIDDLE BLOCK: Pure black gap for content text */
        .text-zone {
            width: 100%;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* 3. BOTTOM BLOCK: Mirrored position layer
           Uses a pseudo-element to mirror ONLY the image graphic
           without flipping the layout container alignment rules. */
        .bottom-right-man::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-size: contain;
            /* Anchors graphic position to the bottom right of its own block */
            background-position: right bottom; 
            /* Horizontally mirrors the figure inward toward the text channel */
            transform: scaleX(-1); 
        }

        /* Central Typography Zone */
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            
            /* Smooth fade-in presentation */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="graphic-block top-left-man"></div>

        <div class="text-zone">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="graphic-block bottom-right-man"></div>
    </div>

</body>
</html>
