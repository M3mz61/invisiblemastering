<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Setup a unified, absolute true black screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pure true black */
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* The main wrapper that locks everything into a single screen frame */
        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background artwork layer - spans full width to prevent any box seams */
        .character-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: left center; /* Keeps your favorite left-aligned orientation */
            background-size: contain;
            z-index: 1;
        }

        /* Typography branding stack - layered beautifully over the background */
        .branding-overlay {
            position: relative;
            z-index: 2; /* Sits sharply on top of the image */
            width: 90%;
            max-width: 450px;
            text-align: center;
            color: #ffffff; /* Brilliant white text */
            margin-top: 25vh; /* Shifts the text up into a proud, central real-estate position */
            
            /* Smooth drop-down entry animation */
            opacity: 0;
            transform: translateY(-20px);
            animation: elegantDropDown 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 0.2s;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Clean off-white contrast layer */
            margin: 0;
            font-weight: 300;
        }

        @keyframes elegantDropDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="character-background"></div>

        <div class="branding-overlay">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
