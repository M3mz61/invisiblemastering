<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Pure pitch black background baseline */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Stacks layout components vertically */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
        }

        /* Using standard brightness/contrast filters to mask image edges into true black */
        .graphic-block {
            width: 100%;
            height: 35vh; 
            background-image: url('detective-cropped.jpg');
            background-repeat: no-repeat;
            background-size: contain;
            background-color: #000000;
            filter: contrast(1.5) brightness(0.9); /* Sharpens line art while crushing background noise */
        }

        /* 1. TOP BLOCK: Positioned closer to center */
        .top-left-man {
            background-position: 23% top; 
        }

        /* 2. MIDDLE BLOCK: Pure typography content channel */
        .text-zone {
            width: 100%;
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }

        /* 3. BOTTOM BLOCK: Mirrored cleanly for iOS Firefox layout stability */
        .bottom-right-man {
            background-position: 23% bottom; 
            transform: scaleX(-1); 
        }

        /* Central branding typography centerpiece */
        .branding-centerpiece {
            width: 90%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7;
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="graphic-block top-left-man"></div>

        <div class="text-zone">
            <div class="branding-centerpiece">
                <h1 class="title">Invisible Mastering Inc</h1>
                <p class="tagline">Heard, but not seen.</p>
            </div>
        </div>

        <div class="graphic-block bottom-right-man"></div>
    </div>

</body>
</html>
