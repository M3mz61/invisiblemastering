<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invisible Mastering Inc</title>
    <style>
        /* Creates an unmovable, true pitch-black viewport */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; 
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        /* Full screen relative wrapper that anchors our corner elements */
        .viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. Upper Left Corner: Original image fixed tightly to the top left */
        .corner-man-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 50vw; /* Takes up half the screen width */
            height: 40vh; /* Takes up 40% of the screen height */
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: left top;
            background-size: contain;
            pointer-events: none;
            z-index: 1;
        }

        /* 2. Bottom Right Corner: Mirrored image fixed tightly to the bottom right */
        .corner-man-bottom {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50vw; 
            height: 40vh; 
            background-image: url('Invisible%20man%201.png');
            background-repeat: no-repeat;
            background-position: right bottom;
            background-size: contain;
            transform: scaleX(-1); /* Flips him horizontally to face left */
            pointer-events: none;
            z-index: 1;
        }

        /* Typography Centerpiece: Centered directly in the gap between them */
        .branding-centerpiece {
            position: relative;
            z-index: 10; /* Lifts text sharply over the background layers */
            width: 85%;
            max-width: 450px;
            text-align: center;
            color: #ffffff;
            
            /* Clean fade-in entry */
            opacity: 0;
            animation: cleanFadeIn 1.2s ease-out forwards;
            animation-delay: 0.1s;
        }

        .title {
            font-size: 2.1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #b5b5b7; /* Balanced off-white contrast */
            margin: 0;
            font-weight: 300;
        }

        @keyframes cleanFadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="viewport-container">
        <div class="corner-man-top"></div>

        <div class="corner-man-bottom"></div>

        <div class="branding-centerpiece">
            <h1 class="title">Invisible Mastering Inc</h1>
            <p class="tagline">Heard, but not seen.</p>
        </div>
    </div>

</body>
</html>
