<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rates | Invisible Mastering Inc.</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 6rem 1.5rem;
        }
        .container {
            max-width: 450px;
            width: 100%;
        }
        .nav-logo {
            width: 45px;
            height: auto;
            margin-bottom: 6rem;
            display: block;
        }
        .nav-logo img {
            width: 100%;
            height: auto;
            display: block;
            filter: invert(1);
        }
        .rate-table {
            margin-top: 2rem;
        }
        .rate-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #1a1a1a;
            padding: 1.5rem 0;
        }
        .rate-name {
            font-size: 0.95rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            font-weight: 400;
            color: #ffffff;
        }
        .rate-price {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 0.05rem;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-logo">
        <img src="images/Hat%20glasses%203:4.png" alt="Home">
    </a>

    <main class="container">
        
        <div class="rate-table">
            <div class="rate-row">
                <span class="rate-name">Stereo Master</span>
                <span class="rate-price">£100</span>
            </div>
        </div>

    </main>

</body>
</html>
