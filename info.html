<div style="max-width: 800px; margin: 0 auto; font-family: Arial, sans-serif;">
    
    <h2>Mastering Services & Rates</h2>
    
    <ul class="price-list" style="list-style: none; padding: 0;">
        <li style="padding: 12px 0; border-bottom: 1px solid #111;">
            <span class="bold-text">Single Track Mastering:</span> 
            <span id="price-single">£6.25 / €7.50 / $7.50</span>
        </li>
        <li style="padding: 12px 0; border-bottom: 1px solid #111;">
            <span class="bold-text">EP Mastering (Up to 4 Tracks):</span> 
            <span id="price-ep">£20.00 / €24.00 / $25.00</span>
        </li>
        <li style="padding: 12px 0; border-bottom: 1px solid #111;">
            <span class="bold-text">Full Album Mastering (Up to 12 Tracks):</span> 
            <span id="price-album">£50.00 / €60.00 / $60.00</span>
        </li>
        <li style="padding: 12px 0; border-bottom: 1px solid #111;">
            <span class="bold-text">Stem Mastering (Per Track / Max 5 Stems):</span> 
            <span id="price-stem">£11.25 / €13.50 / $13.75</span>
        </li>
    </ul>

    <div style="background-color: #111111; border: 1px solid #222222; border-radius: 6px; padding: 20px; margin-top: 25px; text-align: left;">
        <label for="promoInput" style="display: block; font-weight: bold; margin-bottom: 8px; color: #ffffff; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;">
            Have a promotional code?
        </label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="promoInput" placeholder="Enter code here" style="flex: 1; background-color: #000000; color: #ffffff; border: 1px solid #333333; padding: 10px; border-radius: 4px; font-size: 14px; outline: none;">
            <button onclick="applyPromoCode()" style="background-color: #ffffff; color: #000000; border: none; padding: 10px 20px; font-weight: bold; font-size: 14px; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: background 0.2s;">
                Apply
            </button>
        </div>
        <p id="promoMessage" style="margin: 10px 0 0 0; font-size: 13px; font-weight: bold; display: none;"></p>
    </div>

</div>

<script>
function applyPromoCode() {
    var code = document.getElementById("promoInput").value.trim().toUpperCase();
    var msg = document.getElementById("promoMessage");
    
    // Target Elements
    var single = document.getElementById("price-single");
    var ep = document.getElementById("price-ep");
    var album = document.getElementById("price-album");
    var stem = document.getElementById("price-stem");

    // Clear previous status style rules
    msg.style.display = "block";

    if (code === "PREMIUM20" || code === "MASTER20") {
        // Apply 20% tier calculations to the base 1/4 layout values
        single.innerHTML = "<span style='text-decoration: line-through; color: #555;'>£6.25 / €7.50 / $7.50</span> <span style='color: #00ff00;'>£5.00 / €6.00 / $6.00</span>";
        ep.innerHTML = "<span style='text-decoration: line-through; color: #555;'>£20.00 / €24.00 / $25.00</span> <span style='color: #00ff00;'>£16.00 / €19.20 / $20.00</span>";
        album.innerHTML = "<span style='text-decoration: line-through; color: #555;'>£50.00 / €60.00 / $60.00</span> <span style='color: #00ff00;'>£40.00 / €48.00 / $48.00</span>";
        stem.innerHTML = "<span style='text-decoration: line-through; color: #555;'>£11.25 / €13.50 / $13.75</span> <span style='color: #00ff00;'>£9.00 / €10.80 / $11.00</span>";
        
        msg.style.color = "#00ff00";
        msg.innerHTML = "Success: 20% promotional discount applied to your order.";
    } else if (code === "") {
        msg.style.color = "#ff3333";
        msg.innerHTML = "Error: Please enter a valid code string before applying.";
    } else {
        msg.style.color = "#ff3333";
        msg.innerHTML = "Error: Invalid or expired promotional voucher code.";
    }
}
</script>
