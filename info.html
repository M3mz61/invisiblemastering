<h2>MASTERING SERVICES & RATES</h2>
<ul style="list-style: none; padding: 0; margin: 20px 0;">
    <li style="padding: 14px 0; border-bottom: 1px solid #222222; font-size: 16px; overflow: hidden; clear: both;">
        <span style="float: left; font-weight: bold;">Single Track Mastering:</span> 
        <span id="rate-single" style="float: right; font-weight: bold;">£100.00 / €120.00 / $130.00</span>
    </li>
    <li style="padding: 14px 0; border-bottom: 1px solid #222222; font-size: 16px; overflow: hidden; clear: both;">
        <span style="float: left; font-weight: bold;">EP Mastering (Up to 4 Tracks):</span> 
        <span id="rate-ep" style="float: right; font-weight: bold;">£320.00 / €384.00 / $416.00</span>
    </li>
    <li style="padding: 14px 0; border-bottom: 1px solid #222222; font-size: 16px; overflow: hidden; clear: both;">
        <span style="float: left; font-weight: bold;">Full Album Mastering (Up to 12 Tracks):</span> 
        <span id="rate-album" style="float: right; font-weight: bold;">£800.00 / €960.00 / $1,040.00</span>
    </li>
    <li style="padding: 14px 0; border-bottom: 1px solid #222222; font-size: 16px; overflow: hidden; clear: both;">
        <span style="float: left; font-weight: bold;">Stem Mastering (Per Track / Max 5 Stems):</span> 
        <span id="rate-stem" style="float: right; font-weight: bold;">£180.00 / €216.00 / $234.00</span>
    </li>
</ul>

<div style="margin: 35px 0; padding: 20px; border: 1px solid #222222; background-color: #121212; border-radius: 4px; clear: both;">
    <label for="promoField" style="display: block; font-weight: bold; margin-bottom: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #ffffff;">
        Have a promotional code?
    </label>
    <div style="display: flex; gap: 12px;">
        <input type="text" id="promoField" placeholder="Enter code here" style="flex: 1; padding: 12px; font-size: 14px; background-color: #000000; color: #ffffff; border: 1px solid #333333; outline: none; text-transform: uppercase;">
        <button onclick="checkPromoVoucher()" style="padding: 0 24px; font-size: 13px; font-weight: bold; background-color: #ffffff; color: #000000; border: none; cursor: pointer; text-transform: uppercase; height: 43px;">
            Apply
        </button>
    </div>
    <p id="promoFeedback" style="margin: 12px 0 0 0; font-size: 13px; font-weight: bold; display: none;"></p>
</div>

<script>
function checkPromoVoucher() {
    var textCode = document.getElementById("promoField").value.trim().toUpperCase();
    var feedbackNode = document.getElementById("promoFeedback");
    
    var tSingle = document.getElementById("rate-single");
    var tEp = document.getElementById("rate-ep");
    var tAlbum = document.getElementById("rate-album");
    var tStem = document.getElementById("rate-stem");

    feedbackNode.style.display = "block";

    if (textCode === "PREMIUM20" || textCode === "MASTER20") {
        tSingle.innerHTML = "<span style='text-decoration: line-through; color: #666666; margin-right: 8px;'>£100.00 / €120.00 / $130.00</span> <span style='color: #00ff00;'>£80.00 / €96.00 / $104.00</span>";
        tEp.innerHTML = "<span style='text-decoration: line-through; color: #666666; margin-right: 8px;'>£320.00 / €384.00 / $416.00</span> <span style='color: #00ff00;'>£256.00 / €307.20 / $332.80</span>";
        tAlbum.innerHTML = "<span style='text-decoration: line-through; color: #666666; margin-right: 8px;'>£800.00 / €960.00 / $1,040.00</span> <span style='color: #00ff00;'>£640.00 / €768.00 / $832.00</span>";
        tStem.innerHTML = "<span style='text-decoration: line-through; color: #666666; margin-right: 8px;'>£180.00 / €216.00 / $234.00</span> <span style='color: #00ff00;'>£144.00 / €172.80 / $187.20</span>";
        
        feedbackNode.style.color = "#00ff00";
        feedbackNode.innerHTML = "Success: 20% promotional discount applied.";
    } else if (textCode === "") {
        feedbackNode.style.color = "#ff3333";
        feedbackNode.innerHTML = "Error: Please enter a code.";
    } else {
        feedbackNode.style.color = "#ff3333";
        feedbackNode.innerHTML = "Error: Invalid or expired promotional code.";
    }
}
</script>
