<div style="max-width: 800px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; color: #ffffff; text-align: left;">

    <h2>Mastering Services & Rates</h2>
    <ul style="list-style: none; padding: 0; margin: 20px 0;">
        <li style="padding: 14px 0; border-bottom: 1px solid #1c1c1c; font-size: 16px;">
            <strong style="color: #ffffff;">Single Track Mastering:</strong> 
            <span id="rate-single" style="margin-left: 10px;">£6.25 / €7.50 / $7.50</span>
        </li>
        <li style="padding: 14px 0; border-bottom: 1px solid #1c1c1c; font-size: 16px;">
            <strong style="color: #ffffff;">EP Mastering (Up to 4 Tracks):</strong> 
            <span id="rate-ep" style="margin-left: 10px;">£20.00 / €24.00 / $25.00</span>
        </li>
        <li style="padding: 14px 0; border-bottom: 1px solid #1c1c1c; font-size: 16px;">
            <strong style="color: #ffffff;">Full Album Mastering (Up to 12 Tracks):</strong> 
            <span id="rate-album" style="margin-left: 10px;">£50.00 / €60.00 / $60.00</span>
        </li>
        <li style="padding: 14px 0; border-bottom: 1px solid #1c1c1c; font-size: 16px;">
            <strong style="color: #ffffff;">Stem Mastering (Per Track / Max 5 Stems):</strong> 
            <span id="rate-stem" style="margin-left: 10px;">£11.25 / €13.50 / $13.75</span>
        </li>
    </ul>

    <div style="background-color: #121212; border: 1px solid #222222; border-radius: 6px; padding: 20px; margin: 30px 0;">
        <label for="promoField" style="display: block; font-weight: bold; margin-bottom: 10px; color: #ffffff; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;">
            Have a promotional code?
        </label>
        <div style="display: flex; gap: 12px;">
            <input type="text" id="promoField" placeholder="Enter code here" style="flex: 1; background-color: #000000; color: #ffffff; border: 1px solid #333333; padding: 12px; border-radius: 4px; font-size: 14px; outline: none; text-transform: uppercase;">
            <button onclick="checkPromoVoucher()" style="background-color: #ffffff; color: #000000; border: none; padding: 0 24px; font-weight: bold; font-size: 13px; cursor: pointer; border-radius: 4px; text-transform: uppercase;">
                Apply
            </button>
        </div>
        <p id="promoFeedback" style="margin: 12px 0 0 0; font-size: 13px; font-weight: bold; display: none;"></p>
    </div>

</div>

<script>
function checkPromoVoucher() {
    var textCode = document.getElementById("promoField").value.trim().toUpperCase();
    var feedbackNode = document.getElementById("promoFeedback");
    
    var tSingle = document.getElementById("rate-single");
    var tEp = document.getElementById("rate-ep");
    var tAlbum = document.getElementById("rate-album");
    var tStem = document.getElementById("rate-stem");

    feedbackNode.style.display = "block";

    if (textCode === "PREMIUM20" || textCode === "MASTER20") {
        tSingle.innerHTML = "<span style='text-decoration: line-through; color: #555555;'>£6.25 / €7.50 / $7.50</span> <span style='color: #00ff00; font-weight: bold;'>£5.00 / €6.00 / $6.00</span>";
        tEp.innerHTML = "<span style='text-decoration: line-through; color: #555555;'>£20.00 / €24.00 / $25.00</span> <span style='color: #00ff00; font-weight: bold;'>£16.00 / €19.20 / $20.00</span>";
        tAlbum.innerHTML = "<span style='text-decoration: line-through; color: #555555;'>£50.00 / €60.00 / $60.00</span> <span style='color: #00ff00; font-weight: bold;'>£40.00 / €48.00 / $48.00</span>";
        tStem.innerHTML = "<span style='text-decoration: line-through; color: #555555;'>£11.25 / €13.50 / $13.75</span> <span style='color: #00ff00; font-weight: bold;'>£9.00 / €10.80 / $11.00</span>";
        
        feedbackNode.style.color = "#00ff00";
        feedbackNode.innerHTML = "Success: 20% promotional discount applied.";
    } else if (textCode === "") {
        feedbackNode.style.color = "#ff3333";
        feedbackNode.innerHTML = "Error: Please enter a code.";
    } else {
        feedbackNode.style.color = "#ff3333";
        feedbackNode.innerHTML = "Error: Invalid or expired promotional code.";
    }
}
</script>
