<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering Services</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }
        .wrapper {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            border-bottom: 2px solid #222222;
            padding-bottom: 8px;
            margin-top: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .price-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        .price-list li {
            padding: 14px 0;
            border-bottom: 1px solid #1c1c1c;
            font-size: 16px;
        }
        .bold-text {
            color: #ffffff;
            font-weight: bold;
        }
        .price-values {
            float: right;
            color: #cccccc;
        }
        /* Promo Box */
        .promo-container {
            background-color: #121212;
            border: 1px solid #222222;
            border-radius: 6px;
            padding: 20px;
            margin: 30px 0;
            clear: both;
        }
        .promo-label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .promo-row {
            display: flex;
            gap: 12px;
        }
        .promo-input {
            flex: 1;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            text-transform: uppercase;
        }
        .promo-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 0 24px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .promo-message {
            margin: 12px 0 0 0;
            font-size: 13px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <h2>Mastering Services & Rates</h2>
    <ul class="price-list">
        <li>
            <span class="bold-text">Single Track Mastering:</span> 
            <span id="rate-single" class="price-values">£6.25 / €7.50 / $7.50</span>
        </li>
        <li>
            <span class="bold-text">EP Mastering (Up to 4 Tracks):</span> 
            <span id="rate-ep" class="price-values">£20.00 / €24.00 / $25.00</span>
        </li>
        <li>
            <span class="bold-text">Full Album Mastering (Up to 12 Tracks):</span> 
            <span id="rate-album" class="price-values">£50.00 / €60.00 / $60.00</span>
        </li>
        <li>
            <span class="bold-text">Stem Mastering (Per Track / Max 5 Stems):</span> 
            <span id="rate-stem" class="price-values">£11.25 / €13.50 / $13.75</span>
        </li>
    </ul>

    <div class="promo-container">
        <label for="promoField" class="promo-label">Have a promotional code?</label>
        <div class="promo-row">
            <input type="text" id="promoField" placeholder="Enter code here" class="promo-input">
            <button onclick="checkPromoVoucher()" class="promo-btn">Apply</button>
        </div>
        <p id="promoFeedback" class="promo-message"></p>
    </div>

</div>

<script>
function checkPromoVoucher() {
    var textCode = document.getElementById("promoField").value.trim().toUpperCase();
    var feedbackNode = document.getElementById("promoFeedback");
    
    var tSingle = document.getElementById("rate-single");
    var tEp = document.getElementById("rate-ep");
    var tAlbum = document.getElementById("rate-album");
    var tStem = document.getElementById("rate-stem");

    feedbackNode.style.display = "block";

    if (textCode === "PREMIUM20" || textCode === "MASTER20") {
        tSingle.innerHTML = "<span style='text-decoration: line-through; color: #555555; margin-right: 8px;'>£6.25 / €7.50 / $7.50</span><span style='color: #00ff00; font-weight: bold;'>£5.00 / €6.00 / $6.00</span>";
        tEp.innerHTML = "<span style='text-decoration: line-through; color: #555555; margin-right: 8px;'>£20.00 / €24.00 / $25.00</span><span style='color: #00ff00; font-weight: bold;'>£16.00 / €19.20 / $20.00</span>";
        tAlbum.innerHTML = "<span style='text-decoration: line-through; color: #555555; margin-right: 8px;'>£50.00 / €60.00 / $60.00</span><span style='color: #00ff00; font-weight: bold;'>£40.00 / €48.00 / $48.00</span>";
        tStem.innerHTML = "<span style='text-decoration: line-through; color: #555555; margin-right: 8px;'>£11.25 / €13.50 / $13.75</span><span style='color: #00ff00; font-weight: bold;'>£9.00 / €10.80 / $11.00</span>";
        
        feedbackNode.style.color = "#00ff00";
        feedbackNode.innerHTML = "Success: 20% promotional discount applied.";
    } else if (textCode === "") {
        feedbackNode.style.color = "#ff3333";
        feedbackNode.innerHTML = "Error: Please enter a code.";
    } else {
        feedbackNode.style.color = "#ff3333";
        feedbackNode.innerHTML = "Error: Invalid or expired promotional code.";
    }
}
</script>

</body>
</html>
